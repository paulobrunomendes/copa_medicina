<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar ao Vivo — Copa Med Horus</title>
  <link rel="icon" href="/public/logo-icon.png" type="image/png">
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/logo-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="stylesheet" href="/public/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: var(--bg); }

    .jogo-hero {
      background: #0a0a0a url('/public/court-bg.webp') center/cover no-repeat;
      position: relative;
      color: white;
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
    }
    .jogo-hero::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.82);
      pointer-events: none;
    }
    .jogo-hero > * { position: relative; z-index: 1; }

    .jogo-hero-modal {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-bottom: 0.5rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .jogo-hero-times {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .hero-time {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      min-width: 110px;
      flex: 1;
      max-width: 160px;
    }

    .hero-escudo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: white;
      border: 3px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    .hero-nome {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.3;
    }

    .hero-placar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .hero-gol {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      min-width: 72px;
      text-align: center;
      transition: transform 0.2s, opacity 0.2s;
      letter-spacing: -2px;
    }

    .hero-gol.animando {
      transform: scale(1.3);
      opacity: 0.7;
    }

    .hero-sep {
      font-size: 2.5rem;
      opacity: 0.4;
      font-weight: 300;
    }

    .status-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 0.3rem 0.9rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }
    .status-live-badge.live {
      background: rgba(220,38,38,0.25);
      border-color: rgba(220,38,38,0.6);
      color: #fca5a5;
      box-shadow: 0 0 20px rgba(220,38,38,0.3);
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{box-shadow:0 0 20px rgba(220,38,38,0.3)} 50%{box-shadow:0 0 35px rgba(220,38,38,0.55)} }

    .info-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); font-size: 0.82rem; min-width: 80px; flex-shrink: 0; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0.5rem 0;
      min-height: 44px;
    }

    .back-btn:hover { color: white; }

    @media (max-width: 520px) {
      .jogo-hero { padding: 1.75rem 1rem 2rem; }
      .jogo-hero-times { gap: 0.75rem; margin: 1rem 0; }
      .hero-escudo { width: 54px; height: 54px; font-size: 0.95rem; border-width: 2px; }
      .hero-nome { font-size: 0.85rem; }
      .hero-gol { font-size: 3.5rem; min-width: 52px; }
      .hero-sep { font-size: 1.8rem; }
      .hero-placar { gap: 0.5rem; }
      .hero-time { min-width: 80px; gap: 0.5rem; }
    }

    /* ===== NOTIFICAÇÃO DE GOL IN-PAGE ===== */
    .gol-notif {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .gol-notif.show { opacity: 1; }
    .gol-notif-bg {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
    }
    .gol-notif-box {
      position: relative;
      text-align: center;
      animation: golPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes golPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .gol-notif-emoji { font-size: 4rem; display: block; margin-bottom: 0.25rem; }
    .gol-notif-title {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 900;
      color: #f5c200;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 4px 24px rgba(0,0,0,0.6);
      margin-bottom: 0.5rem;
    }
    .gol-notif-jogador {
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 0.4rem 1.5rem;
      display: inline-block;
      margin-bottom: 0.5rem;
    }
    .gol-notif-time {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<!-- Overlay de gol -->
<div class="gol-notif" id="golNotif">
  <div class="gol-notif-bg"></div>
  <div class="gol-notif-box">
    <span class="gol-notif-emoji">⚽</span>
    <div class="gol-notif-title">GOL!</div>
    <div class="gol-notif-jogador" id="golNotifJogador"></div>
    <div class="gol-notif-time" id="golNotifTime"></div>
  </div>
</div>

<div class="jogo-hero" id="jogoHero">
  <button class="back-btn" onclick="history.back()">← Voltar</button>
  <div id="heroContent">
    <div style="opacity:0.6">Carregando jogo...</div>
  </div>
</div>

<div class="container" style="max-width:600px">
  <!-- Contagem regressiva -->
  <div class="info-card" id="countdownCard" style="display:none;text-align:center;padding:1.5rem">
    <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.5rem">Começa em</div>
    <div style="font-size:2rem;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums" id="countdownDisplay">—</div>
  </div>

  <div class="info-card" id="infoCard" style="display:none">
    <div class="info-row">
      <span class="info-label">📅 Data</span>
      <span id="infoData">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">📍 Local</span>
      <span id="infoLocal">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">🏅 Fase</span>
      <span id="infoFase">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">⚽ Modalidade</span>
      <span id="infoModalidade">—</span>
    </div>
  </div>

  <div class="info-card" id="cartoesCard" style="display:none">
    <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.75rem">🟨 Cartões</div>
    <div id="cartoesListPublic"></div>
  </div>

  <div class="info-card" id="golsCard" style="display:none">
    <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem">
      ⚽ Artilheiros
    </div>
    <div id="golsListPublic"></div>
  </div>

  <!-- WhatsApp share -->
  <div style="text-align:center;padding:0.75rem 0 0.25rem">
    <button id="btnWhatsApp" onclick="compartilharWhatsApp()"
      style="display:inline-flex;align-items:center;gap:0.5rem;background:#25d366;color:white;border:none;border-radius:10px;padding:0.55rem 1.25rem;font-family:inherit;font-size:0.875rem;font-weight:700;cursor:pointer;transition:all 0.18s;"
      onmouseover="this.style.background='#1ebe5d'" onmouseout="this.style.background='#25d366'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Compartilhar no WhatsApp
    </button>
  </div>

  <!-- MVP -->
  <div class="info-card" id="mvpCard" style="display:none">
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span style="font-size:1.75rem">🏅</span>
      <div>
        <div style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:0.1rem">MVP da Partida</div>
        <div style="font-weight:800;font-size:1.05rem" id="mvpNome"></div>
        <div style="font-size:0.8rem;color:var(--text-muted)" id="mvpTime"></div>
      </div>
    </div>
  </div>

  <!-- Parciais -->
  <div class="info-card" id="parciaisCard" style="display:none">
    <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.75rem">📊 Parciais</div>
    <table style="width:100%;border-collapse:collapse;font-size:0.85rem" id="parciaisTable">
      <thead>
        <tr style="color:var(--text-muted)">
          <th style="text-align:left;padding:0.3rem 0;font-weight:600">Período</th>
          <th style="text-align:center;padding:0.3rem 0;font-weight:600" id="parciaisCasaTh">Casa</th>
          <th style="text-align:center;padding:0.3rem 0;font-weight:600" id="parciaisVisTh">Visitante</th>
        </tr>
      </thead>
      <tbody id="parciaisTbody"></tbody>
    </table>
  </div>

  <!-- Histórico (colapsável) -->
  <div class="info-card" id="historicoCard" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleHistorico()">
      <div style="font-weight:700;font-size:0.85rem">📋 Histórico</div>
      <span id="historicoChevron" style="font-size:0.75rem;color:var(--text-muted)">▼</span>
    </div>
    <div id="historicoBody" style="display:none;margin-top:0.75rem"></div>
  </div>

  <div style="text-align:center;padding:1rem 0">
    <a href="/" style="color:var(--text-muted);font-size:0.875rem">🏆 Ver todos os jogos</a>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="/public/js/app.js"></script>
<script>
  const socket = io();
  let jogo = null;
  let jogoTimerInterval = null;

  // Pegar ID do jogo da URL: /jogo.html?id=5
  const jogoId = new URLSearchParams(window.location.search).get('id');

  function calcularSegundosJogo(j) {
    let s = j.timer_decorrido || 0;
    if (j.timer_ativo && j.timer_inicio) s += Math.floor((Date.now() - Number(j.timer_inicio)) / 1000);
    return s;
  }

  function formatarTempoJogo(segundos) {
    const m = Math.floor(segundos / 60).toString().padStart(2, '0');
    const s = (segundos % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function iniciarTickJogo(j) {
    if (jogoTimerInterval) { clearInterval(jogoTimerInterval); jogoTimerInterval = null; }
    if (!j.timer_ativo) return;
    const dur = (j.duracao_periodo || 45) * 60;
    function tick() {
      const s = Math.min(calcularSegundosJogo(j), dur);
      const el = document.getElementById('heroTimerDisplay');
      if (el) el.textContent = formatarTempoJogo(s);
    }
    tick();
    jogoTimerInterval = setInterval(tick, 1000);
  }

  function timerBadgeHTML(j) {
    if (j.status === 'encerrado') return `<div class="status-live-badge">⏱ FT</div>`;
    if (j.status !== 'ao_vivo' || !j.periodo_atual) return '';
    const p = `${j.periodo_atual}T`;
    const dur = (j.duracao_periodo || 45) * 60;
    const s = Math.min(calcularSegundosJogo(j), dur);
    return `<div class="status-live-badge" style="font-size:1rem;padding:0.4rem 1.2rem">
      ${p} <span id="heroTimerDisplay" style="font-variant-numeric:tabular-nums">${formatarTempoJogo(s)}</span>
    </div>`;
  }

  function renderHero(j) {
    document.title = `${j.time_casa_sigla} × ${j.time_visitante_sigla} — Copa Med Horus`;

    const statusBadge = j.status === 'ao_vivo'
      ? `<div class="status-live-badge live"><span class="live-dot" style="background:#ef4444;box-shadow:0 0 8px #ef4444"></span> AO VIVO</div>`
      : j.status === 'encerrado'
      ? `<div class="status-live-badge">✅ ENCERRADO</div>`
      : `<div class="status-live-badge">📅 AGENDADO</div>`;

    document.getElementById('heroContent').innerHTML = `
      <div>${statusBadge}</div>
      ${timerBadgeHTML(j)}
      <div class="jogo-hero-modal">${j.modalidade_icone} ${j.modalidade_nome} — ${j.grupo_nome ? 'Grupo ' + j.grupo_nome : faseLabel(j.fase)}</div>
      <div class="jogo-hero-times">
        <div class="hero-time">
          ${j.time_casa_logo
            ? `<img src="${j.time_casa_logo}" alt="${j.time_casa_sigla}" class="hero-escudo" style="object-fit:contain;background:white;padding:6px;" onerror="this.outerHTML='<div class=\\'hero-escudo\\' style=\\'background:${j.time_casa_cor}\\'>${j.time_casa_sigla}</div>'">`
            : `<div class="hero-escudo" style="background:${j.time_casa_cor}">${j.time_casa_sigla}</div>`}
          <div class="hero-nome">${j.time_casa_nome}</div>
        </div>
        <div class="hero-placar" style="flex-direction:column;align-items:center;gap:0.2rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <div class="hero-gol" id="heroGolCasa">${j.status === 'agendado' ? '—' : j.gols_casa}</div>
            <div class="hero-sep">×</div>
            <div class="hero-gol" id="heroGolVis">${j.status === 'agendado' ? '—' : j.gols_visitante}</div>
          </div>
          ${(j.gols_prorrogacao_casa || j.gols_prorrogacao_visitante) ? `<div id="heroProrr" style="font-size:0.72rem;opacity:0.8;font-weight:600">Prorr. ${j.gols_prorrogacao_casa} × ${j.gols_prorrogacao_visitante}</div>` : '<div id="heroProrr"></div>'}
          ${(j.gols_penaltis_casa || j.gols_penaltis_visitante) ? `<div id="heroPen" style="font-size:0.72rem;opacity:0.8;font-weight:600">Pên. ${j.gols_penaltis_casa} × ${j.gols_penaltis_visitante}</div>` : '<div id="heroPen"></div>'}
        </div>
        <div class="hero-time">
          ${j.time_visitante_logo
            ? `<img src="${j.time_visitante_logo}" alt="${j.time_visitante_sigla}" class="hero-escudo" style="object-fit:contain;background:white;padding:6px;" onerror="this.outerHTML='<div class=\\'hero-escudo\\' style=\\'background:${j.time_visitante_cor}\\'>${j.time_visitante_sigla}</div>'">`
            : `<div class="hero-escudo" style="background:${j.time_visitante_cor}">${j.time_visitante_sigla}</div>`}
          <div class="hero-nome">${j.time_visitante_nome}</div>
        </div>
      </div>
    `;
    iniciarTickJogo(j);

    // Contagem regressiva (só quando agendado e tem data)
    if (j.status === 'agendado' && j.data_jogo) {
      iniciarContagem(j.data_jogo);
    } else {
      const cd = document.getElementById('countdownCard');
      if (cd) cd.style.display = 'none';
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    }

    // Info card
    document.getElementById('infoCard').style.display = '';
    document.getElementById('infoData').textContent = j.data_jogo ? formatarData(j.data_jogo) : 'A definir';
    document.getElementById('infoLocal').textContent = j.local_jogo || 'A definir';
    document.getElementById('infoFase').textContent = faseLabel(j.fase);
    document.getElementById('infoModalidade').textContent = `${j.modalidade_icone} ${j.modalidade_nome}`;
  }

  function animarGol(elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.classList.add('animando');
    setTimeout(() => el.classList.remove('animando'), 400);
  }

  socket.on('placar_atualizado', (j) => {
    if (String(j.id) !== String(jogoId)) return;

    const casaEl = document.getElementById('heroGolCasa');
    const visEl  = document.getElementById('heroGolVis');

    if (casaEl && casaEl.textContent != j.gols_casa) { animarGol('heroGolCasa'); casaEl.textContent = j.gols_casa; }
    if (visEl  && visEl.textContent  != j.gols_visitante) { animarGol('heroGolVis'); visEl.textContent = j.gols_visitante; }

    jogo = j;
    renderHero(j);
  });

  socket.on('timer_atualizado', (td) => {
    if (String(td.id) !== String(jogoId) || !jogo) return;
    jogo.periodo_atual   = td.periodo_atual;
    jogo.timer_ativo     = td.timer_ativo;
    jogo.timer_inicio    = td.timer_inicio;
    jogo.timer_decorrido = td.timer_decorrido;
    jogo.duracao_periodo = td.duracao_periodo || jogo.duracao_periodo;
    renderHero(jogo);
  });

  // ===== CARTÕES =====
  function renderCartoesPublic(cartoes) {
    const card = document.getElementById('cartoesCard');
    const list = document.getElementById('cartoesListPublic');
    if (!card || !list) return;
    card.style.display = cartoes.length > 0 ? '' : 'none';
    list.innerHTML = cartoes.map((c, i) => `
      <div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0;${i < cartoes.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
        <div style="width:12px;height:16px;border-radius:2px;background:${c.tipo === 'vermelho' ? '#dc2626' : '#f59e0b'};flex-shrink:0"></div>
        <span style="font-weight:700;font-size:0.75rem;color:var(--text-muted);min-width:32px">${c.time_sigla}</span>
        <span style="font-weight:500;flex:1">${c.jogador}</span>
        ${c.minuto || c.periodo ? `<span style="color:var(--text-muted);font-size:0.78rem;font-weight:600">${c.periodo ? c.periodo + 'T ' : ''}${c.minuto ? c.minuto + "'" : ''}</span>` : ''}
      </div>
    `).join('');
  }

  socket.on('cartoes_atualizados', (data) => {
    if (String(data.jogo_id) !== String(jogoId)) return;
    renderCartoesPublic(data.cartoes);
  });

  // ===== ARTILHEIROS =====
  function renderGolsPublic(gols) {
    const card = document.getElementById('golsCard');
    const list = document.getElementById('golsListPublic');
    if (!card || !list) return;
    card.style.display = gols.length > 0 ? '' : 'none';
    list.innerHTML = gols.map((g, i) => `
      <div style="display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0;${i < gols.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
        <div style="width:8px;height:8px;border-radius:50%;background:${g.time_cor};flex-shrink:0"></div>
        <span style="font-weight:700;font-size:0.75rem;color:var(--text-muted);min-width:32px">${g.time_sigla}</span>
        <span style="font-weight:500;flex:1">${g.jogador}</span>
        ${g.minuto || g.periodo ? `<span style="color:var(--text-muted);font-size:0.78rem;font-weight:600">${g.periodo ? g.periodo + 'T ' : ''}${g.minuto ? g.minuto + "'" : ''}</span>` : ''}
      </div>
    `).join('');
  }

  let golCount = 0;

  function mostrarGolNotif(gol) {
    const el     = document.getElementById('golNotif');
    const nJog   = document.getElementById('golNotifJogador');
    const nTime  = document.getElementById('golNotifTime');
    if (!el) return;
    nJog.textContent  = `${gol.time_sigla} · ${gol.jogador}`;
    const tempoStr = gol.minuto ? `${gol.periodo ? gol.periodo + 'T ' : ''}${gol.minuto}'` : (gol.periodo ? gol.periodo + 'T' : '');
    nTime.textContent = tempoStr || '';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  socket.on('gols_atualizados', (data) => {
    if (String(data.jogo_id) !== String(jogoId)) return;
    const novoTotal = (data.gols || []).length;
    if (novoTotal > golCount && golCount > 0) {
      // Pega o gol mais recente (último da lista)
      const ultimo = data.gols[data.gols.length - 1];
      if (ultimo) mostrarGolNotif(ultimo);
    }
    golCount = novoTotal;
    renderGolsPublic(data.gols);
  });

  // ===== CONTAGEM REGRESSIVA =====
  let countdownInterval = null;
  function iniciarContagem(dataJogo) {
    const card = document.getElementById('countdownCard');
    const display = document.getElementById('countdownDisplay');
    if (!card || !display || !dataJogo) return;
    if (countdownInterval) clearInterval(countdownInterval);

    function tick() {
      const diff = new Date(dataJogo) - Date.now();
      if (diff <= 0) {
        card.style.display = 'none';
        clearInterval(countdownInterval);
        return;
      }
      card.style.display = '';
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      display.textContent = d > 0
        ? `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  // ===== MVP =====
  function renderMvp(j) {
    const card = document.getElementById('mvpCard');
    if (!card) return;
    if (!j.mvp_jogador) { card.style.display = 'none'; return; }
    card.style.display = '';
    document.getElementById('mvpNome').textContent = j.mvp_jogador;
    document.getElementById('mvpTime').textContent = j.mvp_time_id ? '' : '';
  }

  socket.on('mvp_atualizado', (data) => {
    if (String(data.jogo_id) !== String(jogoId)) return;
    if (jogo) { jogo.mvp_jogador = data.mvp_jogador; jogo.mvp_time_id = data.mvp_time_id; }
    renderMvp(data);
  });

  // ===== WHATSAPP =====
  function compartilharWhatsApp() {
    if (!jogo) return;
    const g1 = jogo.status === 'agendado' ? '?' : jogo.gols_casa;
    const g2 = jogo.status === 'agendado' ? '?' : jogo.gols_visitante;
    const texto = `⚽ ${jogo.time_casa_nome} ${g1} × ${g2} ${jogo.time_visitante_nome} — Copa Med Horus\n${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
  }

  // ===== PARCIAIS =====
  function renderParciais(parciais) {
    const card = document.getElementById('parciaisCard');
    const tbody = document.getElementById('parciaisTbody');
    if (!card || !tbody) return;
    if (!parciais || parciais.length === 0) { card.style.display = 'none'; return; }
    card.style.display = '';
    tbody.innerHTML = parciais.map((p, i) => `
      <tr style="${i < parciais.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
        <td style="padding:0.35rem 0;font-weight:600">${p.label || p.numero + 'º'}</td>
        <td style="text-align:center;padding:0.35rem 0;font-weight:700">${p.gols_casa}</td>
        <td style="text-align:center;padding:0.35rem 0;font-weight:700">${p.gols_visitante}</td>
      </tr>`).join('');
    if (jogo) {
      const casaTh = document.getElementById('parciaisCasaTh');
      const visTh  = document.getElementById('parciaisVisTh');
      if (casaTh) casaTh.textContent = jogo.time_casa_sigla;
      if (visTh)  visTh.textContent  = jogo.time_visitante_sigla;
    }
  }

  socket.on('parciais_atualizados', (data) => {
    if (String(data.jogo_id) !== String(jogoId)) return;
    renderParciais(data.parciais);
  });

  // ===== HISTÓRICO =====
  let historicoAberto = false;
  function toggleHistorico() {
    historicoAberto = !historicoAberto;
    document.getElementById('historicoBody').style.display = historicoAberto ? '' : 'none';
    document.getElementById('historicoChevron').textContent = historicoAberto ? '▲' : '▼';
  }

  function renderHistorico(eventos) {
    const card = document.getElementById('historicoCard');
    const body = document.getElementById('historicoBody');
    if (!card || !body) return;
    if (!eventos || eventos.length === 0) { card.style.display = 'none'; return; }
    card.style.display = '';
    body.innerHTML = eventos.map((e, i) => {
      const hora = new Date(e.criado_em).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      return `<div style="display:flex;gap:0.6rem;padding:0.35rem 0;font-size:0.82rem;${i < eventos.length - 1 ? 'border-bottom:1px solid var(--border)' : ''}">
        <span style="color:var(--text-muted);flex-shrink:0;font-variant-numeric:tabular-nums">${hora}</span>
        <span style="flex:1"><strong>${e.acao}</strong>${e.detalhe ? ': ' + e.detalhe : ''}</span>
      </div>`;
    }).join('');
  }

  async function init() {
    if (!jogoId) {
      document.getElementById('heroContent').innerHTML = '<div>Jogo não encontrado.</div>';
      return;
    }
    try {
      jogo = await api.get(`/jogos/${jogoId}`);
      renderHero(jogo);
      socket.emit('entrar_sala', jogoId);
      const [gols, cartoes, parciais, historico] = await Promise.all([
        api.get(`/jogos/${jogoId}/gols`),
        api.get(`/jogos/${jogoId}/cartoes`),
        api.get(`/jogos/${jogoId}/parciais`).catch(() => []),
        api.get(`/jogos/${jogoId}/historico`).catch(() => []),
      ]);
      golCount = gols.length;
      renderGolsPublic(gols);
      renderCartoesPublic(cartoes);
      renderParciais(parciais);
      renderHistorico(historico);
      renderMvp(jogo);
    } catch (err) {
      document.getElementById('heroContent').innerHTML = '<div>Erro ao carregar o jogo.</div>';
    }
  }

  init();

  // ===== PUSH NOTIFICATIONS =====
  function urlB64ToUint8Array(b64) {
    const pad = '='.repeat((4 - b64.length % 4) % 4);
    const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
    const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  async function ativarPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.ready;
      const existing = await reg.pushManager.getSubscription();
      if (existing) return;

      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;

      const { publicKey } = await fetch('/api/push/vapid-public-key').then(r => r.json()).catch(() => ({}));
      if (!publicKey) return;

      const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(publicKey) });
      await fetch('/api/push/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
    } catch (e) { console.warn('Push:', e.message); }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/public/sw.js')
      .then(() => setTimeout(ativarPush, 1500))
      .catch(() => {});
  }
</script>
