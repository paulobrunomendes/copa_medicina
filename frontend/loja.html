<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Oficial — Copa Med Horus</title>
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#0d1f4e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0d1f4e; --primary-mid: #1a3a8f; --primary-light: #2563eb;
      --gold: #f59e0b; --gold-light: #fcd34d; --green: #25d366;
      --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --bg: #f1f5f9;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(7,13,30,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; padding: 0 1.5rem; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-badge { width: 36px; height: 36px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 3px 12px rgba(245,158,11,0.45); }
    .nav-logo-text { font-size: 1rem; font-weight: 800; color: white; letter-spacing: -0.3px; }
    .nav-logo-text span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 0.25rem; }
    .nav-link { padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.7); transition: all 0.18s; white-space: nowrap; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-link.active { color: white; background: rgba(255,255,255,0.12); }
    .nav-link.admin-link { background: linear-gradient(135deg, var(--primary-light), #1d4ed8); color: white; margin-left: 0.5rem; box-shadow: 0 2px 8px rgba(37,99,235,0.35); }
    .nav-link.admin-link:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    @media(max-width:640px) {
      .nav-links { display: none; flex-direction: column; align-items: flex-start; position: absolute; top: 64px; left: 0; right: 0; background: #070d1e; padding: 1rem 1.5rem; gap: 0.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .nav-links.open { display: flex; } .nav-link { width: 100%; } .nav-toggle { display: block; }
    }

    /* PAGE HEADER */
    .page-header { background: linear-gradient(135deg, #050c1f, #0d1f4e); padding: 3.5rem 1.5rem; }
    .page-header-inner { max-width: 1200px; margin: 0 auto; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.75rem); font-weight: 900; color: white; letter-spacing: -0.8px; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1rem; color: rgba(255,255,255,0.6); max-width: 540px; }

    /* MAIN */
    main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .produtos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }

    /* PRODUCT CARD */
    .produto-card {
      background: white; border-radius: 18px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: all 0.22s; display: flex; flex-direction: column;
      border: 1.5px solid transparent;
    }
    .produto-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.12); border-color: rgba(37,99,235,0.15); }
    .produto-foto-wrap { position: relative; }
    .produto-foto { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--bg); display: block; }
    .produto-foto-placeholder { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, #dde4f0, #e8edf5); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .produto-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
    .produto-nome { font-weight: 800; font-size: 1rem; color: var(--text); margin-bottom: 0.4rem; line-height: 1.3; }
    .produto-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.65; flex: 1; margin-bottom: 1rem; }
    .produto-footer { margin-top: auto; }
    .produto-preco { font-size: 1.35rem; font-weight: 900; color: var(--primary); margin-bottom: 0.75rem; letter-spacing: -0.5px; }
    .produto-preco small { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--green); color: white; font-weight: 800; font-size: 0.88rem;
      padding: 0.75rem; border-radius: 12px; transition: all 0.18s; width: 100%;
    }
    .btn-whatsapp:hover { background: #1da851; transform: scale(1.02); box-shadow: 0 4px 16px rgba(37,211,102,0.4); }
    .sem-contato { font-size: 0.78rem; color: var(--text-muted); text-align: center; padding: 0.5rem; }

    /* EMPTY/LOADING */
    .empty-state { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { background: #070d1e; color: rgba(255,255,255,0.45); padding: 2rem 1.5rem; text-align: center; margin-top: 3rem; }
    .footer-logo { font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 0.6rem; }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .footer-link { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.45); transition: color 0.18s; }
    .footer-link:hover { color: white; }
    .footer-copy { font-size: 0.72rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-badge">🏆</div>
      <div class="nav-logo-text">Copa <span>Med Horus</span></div>
    </a>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">Início</a>
      <a href="/placares.html" class="nav-link">⚽ Placares</a>
      <a href="/parceiros.html" class="nav-link">🤝 Parceiros</a>
      <a href="/loja.html" class="nav-link active">🛍️ Loja</a>
      <a href="/admin" class="nav-link admin-link">🔐 Admin</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>🛍️ Loja Oficial</h1>
    <p>Produtos exclusivos da Copa Med Horus. Peça diretamente pelo WhatsApp com facilidade.</p>
  </div>
</div>

<main>
  <div id="produtosContainer" class="produtos-grid">
    <div style="grid-column:1/-1;text-align:center;padding:4rem"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  <div class="footer-logo">🏆 Copa <span>Med Horus</span></div>
  <div class="footer-links">
    <a href="/" class="footer-link">Início</a>
    <a href="/placares.html" class="footer-link">Placares</a>
    <a href="/parceiros.html" class="footer-link">Parceiros</a>
    <a href="/loja.html" class="footer-link">Loja</a>
  </div>
  <div class="footer-copy">© 2025 Copa Med Horus</div>
</footer>

<script>
  async function init() {
    try {
      const produtos = await fetch('/api/produtos').then(r=>r.json());
      const el = document.getElementById('produtosContainer');
      if (!produtos.length) {
        el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🛍️</div>
          <h3>Nenhum produto disponível ainda</h3>
          <p>Em breve teremos produtos exclusivos da Copa Med Horus.</p>
        </div>`;
        return;
      }
      el.innerHTML = produtos.map(p => {
        const preco = p.preco ? parseFloat(p.preco).toFixed(2).replace('.',',') : null;
        const msg = encodeURIComponent(p.whatsapp_msg || `Olá! Tenho interesse no produto: ${p.nome}`);
        const waNum = p.whatsapp ? p.whatsapp.replace(/\D/g,'') : '';
        const waLink = waNum ? `https://wa.me/${waNum}?text=${msg}` : '';
        return `
          <div class="produto-card">
            <div class="produto-foto-wrap">
              ${p.foto
                ? `<img src="${p.foto}" alt="${p.nome}" class="produto-foto" loading="lazy">`
                : `<div class="produto-foto-placeholder">🛍️</div>`}
            </div>
            <div class="produto-body">
              <div class="produto-nome">${p.nome}</div>
              ${p.descricao ? `<div class="produto-desc">${p.descricao}</div>` : '<div class="produto-desc"></div>'}
              <div class="produto-footer">
                ${preco ? `<div class="produto-preco">R$ ${preco}</div>` : ''}
                ${waLink
                  ? `<a href="${waLink}" target="_blank" class="btn-whatsapp">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.083.535 4.042 1.47 5.745L0 24l6.395-1.44A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.853 0-3.587-.503-5.078-1.38l-.364-.214-3.772.849.864-3.681-.235-.378A9.935 9.935 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                      Pedir pelo WhatsApp
                    </a>`
                  : `<div class="sem-contato">Entre em contato para mais informações</div>`}
              </div>
            </div>
          </div>
        `;
      }).join('');
    } catch(e) {
      document.getElementById('produtosContainer').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">❌</div><h3>Erro ao carregar produtos</h3></div>`;
    }
  }

  init();
</script>
</body>
</html>
