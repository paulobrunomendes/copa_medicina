<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Oficial — Copa Med Horus</title>
  <link rel="icon" href="/public/logo-icon.png" type="image/png">
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/logo-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #111111; --primary-mid: #1e1e1e; --primary-light: #2563eb;
      --gold: #F5C200; --gold-light: #ffe94d; --green: #25d366;
      --red: #8B1010;
      --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --bg: #f1f5f9;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(10,10,10,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; padding: 0 1.5rem; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-img { height: 38px; width: auto; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 0.25rem; }
    .nav-link { padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.7); transition: all 0.18s; white-space: nowrap; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-link.active { color: white; background: rgba(255,255,255,0.12); }
    .nav-link.admin-link { background: var(--gold); color: #111; font-weight: 800; margin-left: 0.5rem; box-shadow: 0 2px 8px rgba(245,194,0,0.35); }
    .nav-link.admin-link:hover { background: var(--gold-light); transform: translateY(-1px); }
    .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    @media(max-width:640px) {
      .nav-links { display: none; flex-direction: column; align-items: flex-start; position: absolute; top: 64px; left: 0; right: 0; background: #0a0a0a; padding: 1rem 1.5rem; gap: 0.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .nav-links.open { display: flex; } .nav-link { width: 100%; } .nav-toggle { display: block; }
    }

    /* PAGE HEADER */
    .page-header { background: #111; background-image: url('/public/court-bg.webp'); background-size: cover; background-position: center; position: relative; padding: 3.5rem 1.5rem; border-bottom: 2px solid rgba(245,194,0,0.15); }
    .page-header::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.82); }
    .page-header-inner { position: relative; z-index: 1; }
    .page-header-inner { max-width: 1200px; margin: 0 auto; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.75rem); font-weight: 900; color: white; letter-spacing: -0.8px; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1rem; color: rgba(255,255,255,0.6); max-width: 540px; }

    /* MAIN */
    main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .produtos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.75rem; }

    /* PRODUCT CARD */
    .produto-card {
      background: white; border-radius: 20px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      transition: all 0.25s; display: flex; flex-direction: column;
      border: 1.5px solid var(--border);
    }
    .produto-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.13); border-color: rgba(37,99,235,0.2); }
    .produto-foto-wrap { position: relative; overflow: hidden; }
    .produto-foto {
      width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;
      cursor: zoom-in; transition: transform 0.35s ease;
    }
    .produto-foto:hover { transform: scale(1.06); }
    .produto-foto-placeholder { width: 100%; aspect-ratio: 1/1; background: linear-gradient(135deg, #dde4f0, #e8edf5); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
    .produto-foto-hint {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 0.65rem; font-weight: 700; padding: 0.25rem 0.55rem;
      border-radius: 100px; backdrop-filter: blur(4px); pointer-events: none;
    }
    .produto-body { padding: 1.35rem; flex: 1; display: flex; flex-direction: column; }
    .produto-nome { font-weight: 800; font-size: 1.05rem; color: var(--text); margin-bottom: 0.4rem; line-height: 1.3; }
    .produto-desc { font-size: 0.83rem; color: var(--text-muted); line-height: 1.7; flex: 1; margin-bottom: 1rem; }
    .produto-footer { margin-top: auto; }
    .produto-preco { font-size: 1.5rem; font-weight: 900; color: var(--primary); margin-bottom: 0.85rem; letter-spacing: -0.6px; }
    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--green); color: white; font-weight: 800; font-size: 0.9rem;
      padding: 0.85rem; border-radius: 12px; transition: all 0.18s; width: 100%;
    }
    .btn-whatsapp:hover { background: #1da851; transform: scale(1.02); box-shadow: 0 4px 16px rgba(37,211,102,0.4); }
    .sem-contato { font-size: 0.78rem; color: var(--text-muted); text-align: center; padding: 0.5rem; }

    /* LIGHTBOX */
    .lightbox {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(5,10,25,0.92); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; cursor: zoom-out;
      animation: lbIn 0.2s ease;
    }
    @keyframes lbIn { from { opacity:0 } to { opacity:1 } }
    .lightbox img {
      max-width: 90vw; max-height: 88vh; object-fit: contain;
      border-radius: 14px; box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      cursor: default;
    }
    .lightbox-close {
      position: absolute; top: 1rem; right: 1.25rem;
      background: rgba(255,255,255,0.12); border: none; color: white;
      font-size: 1.8rem; width: 44px; height: 44px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox-nome {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 0.9rem; font-weight: 600;
      white-space: nowrap; text-align: center;
    }

    /* EMPTY/LOADING */
    .empty-state { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { background: #0a0a0a; color: rgba(255,255,255,0.45); padding: 2rem 1.5rem; text-align: center; margin-top: 3rem; border-top: 1px solid rgba(245,194,0,0.12); }
    .footer-logo { font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 0.6rem; }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .footer-link { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.45); transition: color 0.18s; }
    .footer-link:hover { color: white; }
    .footer-copy { font-size: 0.72rem; }
    .footer-instagram { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; background: rgba(245,194,0,0.08); border: 1px solid rgba(245,194,0,0.25); color: rgba(245,194,0,0.8); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700; transition: all 0.2s; text-decoration: none; }
    .footer-instagram:hover { background: rgba(245,194,0,0.15); border-color: rgba(245,194,0,0.5); color: #F5C200; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/public/logo-icon.png" alt="Copa Med Horus" class="nav-logo-img">
    </a>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">Início</a>
      <a href="/noticias.html" class="nav-link">📰 Notícias</a>
      <a href="/placares.html" class="nav-link">⚽ Jogos</a>
      <a href="/chaveamento.html" class="nav-link">🏆 Chaveamento</a>
      <a href="/regulamento.html" class="nav-link">📋 Regulamento</a>
      <a href="/parceiros.html" class="nav-link">🤝 Parceiros</a>
      <a href="/loja.html" class="nav-link active">🛍️ Loja</a>
      <a href="/admin" class="nav-link admin-link">🔐 Admin</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>🛍️ Loja Oficial</h1>
    <p>Produtos exclusivos da Copa Med Horus. Peça diretamente pelo WhatsApp com facilidade.</p>
  </div>
</div>

<main>
  <div id="produtosContainer" class="produtos-grid">
    <div style="grid-column:1/-1;text-align:center;padding:4rem"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  <div class="footer-logo">🏆 Copa <span>Med Horus</span></div>
  <div class="footer-links">
    <a href="/" class="footer-link">Início</a>
    <a href="/noticias.html" class="footer-link">Notícias</a>
    <a href="/placares.html" class="footer-link">Jogos</a>
    <a href="/parceiros.html" class="footer-link">Parceiros</a>
    <a href="/loja.html" class="footer-link">Loja</a>
  </div>
  <a href="https://www.instagram.com/copamedhorus/" target="_blank" rel="noopener" class="footer-instagram">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    @copamedhorus
  </a>
  <div class="footer-copy">© 2025 Copa Med Horus</div>
</footer>

<script>
  async function init() {
    try {
      const produtos = await fetch('/api/produtos').then(r=>r.json());
      const el = document.getElementById('produtosContainer');
      if (!produtos.length) {
        el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🛍️</div>
          <h3>Nenhum produto disponível ainda</h3>
          <p>Em breve teremos produtos exclusivos da Copa Med Horus.</p>
        </div>`;
        return;
      }
      el.innerHTML = produtos.map(p => {
        const preco = p.preco ? parseFloat(p.preco).toFixed(2).replace('.',',') : null;
        const msg = encodeURIComponent(p.whatsapp_msg || `Olá! Tenho interesse no produto: ${p.nome}`);
        const waNum = p.whatsapp ? p.whatsapp.replace(/\D/g,'') : '';
        const waLink = waNum ? `https://wa.me/${waNum}?text=${msg}` : '';
        const nomeEsc = p.nome.replace(/'/g, "\\'");
        return `
          <div class="produto-card">
            <div class="produto-foto-wrap">
              ${p.foto
                ? `<img src="${p.foto}" alt="${p.nome}" class="produto-foto" loading="lazy" onclick="abrirLightbox('${p.foto}','${nomeEsc}')">
                   <div class="produto-foto-hint">🔍 Ver foto</div>`
                : `<div class="produto-foto-placeholder">🛍️</div>`}
            </div>
            <div class="produto-body">
              <div class="produto-nome">${p.nome}</div>
              ${p.descricao ? `<div class="produto-desc">${p.descricao}</div>` : '<div class="produto-desc"></div>'}
              <div class="produto-footer">
                ${preco ? `<div class="produto-preco">R$ ${preco}</div>` : ''}
                ${waLink
                  ? `<a href="${waLink}" target="_blank" class="btn-whatsapp">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.083.535 4.042 1.47 5.745L0 24l6.395-1.44A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.853 0-3.587-.503-5.078-1.38l-.364-.214-3.772.849.864-3.681-.235-.378A9.935 9.935 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                      Pedir pelo WhatsApp
                    </a>`
                  : `<div class="sem-contato">Entre em contato para mais informações</div>`}
              </div>
            </div>
          </div>
        `;
      }).join('');
    } catch(e) {
      document.getElementById('produtosContainer').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">❌</div><h3>Erro ao carregar produtos</h3></div>`;
    }
  }

  function abrirLightbox(src, nome) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `
      <img src="${src}" alt="${nome}" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="fecharLightbox()">×</button>
      <div class="lightbox-nome">${nome}</div>
    `;
    lb.onclick = fecharLightbox;
    document.body.appendChild(lb);
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', escLightbox);
  }

  function fecharLightbox() {
    document.querySelector('.lightbox')?.remove();
    document.body.style.overflow = '';
    document.removeEventListener('keydown', escLightbox);
  }

  function escLightbox(e) { if (e.key === 'Escape') fecharLightbox(); }

  init();
</script>
</body>
</html>
