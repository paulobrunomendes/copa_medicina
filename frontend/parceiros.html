<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parceiros & Benefícios — Copa Med Horus</title>
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#0d1f4e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0d1f4e; --primary-mid: #1a3a8f; --primary-light: #2563eb;
      --gold: #f59e0b; --gold-light: #fcd34d;
      --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --card: #fff; --bg: #f1f5f9;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(7,13,30,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; padding: 0 1.5rem; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-badge { width: 36px; height: 36px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 3px 12px rgba(245,158,11,0.45); }
    .nav-logo-text { font-size: 1rem; font-weight: 800; color: white; letter-spacing: -0.3px; }
    .nav-logo-text span { color: var(--gold); }
    .nav-links { display: flex; align-items: center; gap: 0.25rem; }
    .nav-link { padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.7); transition: all 0.18s; white-space: nowrap; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-link.active { color: white; background: rgba(255,255,255,0.12); }
    .nav-link.admin-link { background: linear-gradient(135deg, var(--primary-light), #1d4ed8); color: white; margin-left: 0.5rem; box-shadow: 0 2px 8px rgba(37,99,235,0.35); }
    .nav-link.admin-link:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    @media(max-width:640px) {
      .nav-links { display: none; flex-direction: column; align-items: flex-start; position: absolute; top: 64px; left: 0; right: 0; background: #070d1e; padding: 1rem 1.5rem; gap: 0.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .nav-links.open { display: flex; } .nav-link { width: 100%; } .nav-toggle { display: block; }
    }

    /* PAGE HEADER */
    .page-header { background: linear-gradient(135deg, #050c1f, #0d1f4e); padding: 3.5rem 1.5rem; }
    .page-header-inner { max-width: 1200px; margin: 0 auto; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.75rem); font-weight: 900; color: white; letter-spacing: -0.8px; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1rem; color: rgba(255,255,255,0.6); max-width: 540px; }

    /* FILTERS */
    .filters-bar { background: white; border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 64px; z-index: 100; }
    .filters-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 0; overflow-x: auto; }
    .filter-btn { padding: 0.4rem 0.9rem; border-radius: 100px; font-size: 0.8rem; font-weight: 700; border: 1.5px solid var(--border); color: var(--text-muted); background: white; cursor: pointer; white-space: nowrap; transition: all 0.18s; }
    .filter-btn:hover { border-color: var(--primary-light); color: var(--primary-light); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    /* MAIN */
    main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .parceiros-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
    .parceiro-card {
      background: white; border-radius: 18px;
      border: 1.5px solid var(--border);
      transition: all 0.22s; overflow: hidden;
    }
    .parceiro-card:hover { border-color: var(--primary-light); transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.1); }
    .parceiro-card-header { padding: 1.5rem 1.5rem 1rem; display: flex; gap: 1rem; align-items: flex-start; }
    .parceiro-logo-wrap { flex-shrink: 0; }
    .parceiro-logo { width: 64px; height: 64px; border-radius: 14px; object-fit: contain; background: var(--bg); border: 1px solid var(--border); }
    .parceiro-logo-placeholder { width: 64px; height: 64px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-mid)); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    .parceiro-info { flex: 1; min-width: 0; }
    .parceiro-cat-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-light); background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2); padding: 0.2rem 0.6rem; border-radius: 100px; display: inline-block; margin-bottom: 0.35rem; }
    .parceiro-nome { font-weight: 800; font-size: 1rem; color: var(--text); line-height: 1.3; }
    .parceiro-beneficio-tag { display: flex; align-items: flex-start; gap: 0.4rem; background: rgba(5,150,105,0.06); border-top: 1px solid rgba(5,150,105,0.12); padding: 0.75rem 1.5rem; }
    .parceiro-beneficio-tag span { font-size: 0.82rem; font-weight: 600; color: #047857; line-height: 1.5; }
    .parceiro-body { padding: 0 1.5rem 1rem; }
    .parceiro-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.65; }
    .parceiro-contacts { padding: 0.85rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .parceiro-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; font-weight: 700; padding: 0.45rem 0.9rem;
      border-radius: 8px; transition: all 0.18s;
    }
    .parceiro-btn.wa { background: rgba(37,211,102,0.1); color: #16a34a; }
    .parceiro-btn.wa:hover { background: #25d366; color: white; }
    .parceiro-btn.site { background: rgba(37,99,235,0.08); color: var(--primary-light); }
    .parceiro-btn.site:hover { background: var(--primary-light); color: white; }
    .parceiro-btn.tel { background: rgba(100,116,139,0.08); color: var(--text-muted); }
    .parceiro-btn.tel:hover { background: var(--text-muted); color: white; }

    /* EMPTY/LOADING */
    .empty-state { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { background: #070d1e; color: rgba(255,255,255,0.45); padding: 2rem 1.5rem; text-align: center; margin-top: 3rem; }
    .footer-logo { font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 0.6rem; }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .footer-link { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.45); transition: color 0.18s; }
    .footer-link:hover { color: white; }
    .footer-copy { font-size: 0.72rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-badge">🏆</div>
      <div class="nav-logo-text">Copa <span>Med Horus</span></div>
    </a>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">Início</a>
      <a href="/placares.html" class="nav-link">⚽ Placares</a>
      <a href="/parceiros.html" class="nav-link active">🤝 Parceiros</a>
      <a href="/loja.html" class="nav-link">🛍️ Loja</a>
      <a href="/admin" class="nav-link admin-link">🔐 Admin</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>🤝 Parceiros & Benefícios</h1>
    <p>Estabelecimentos e empresas que apoiam a Copa Med Horus e oferecem descontos e vantagens exclusivas para os participantes.</p>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-inner" id="filtersBar">
    <button class="filter-btn active" onclick="filtrar('')" data-cat="">Todos</button>
  </div>
</div>

<main>
  <div id="parceirosContainer" class="parceiros-grid">
    <div style="grid-column:1/-1;text-align:center;padding:4rem"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  <div class="footer-logo">🏆 Copa <span>Med Horus</span></div>
  <div class="footer-links">
    <a href="/" class="footer-link">Início</a>
    <a href="/placares.html" class="footer-link">Placares</a>
    <a href="/parceiros.html" class="footer-link">Parceiros</a>
    <a href="/loja.html" class="footer-link">Loja</a>
  </div>
  <div class="footer-copy">© 2025 Copa Med Horus</div>
</footer>

<script>
  let todosOsParceiros = [];
  let catAtiva = '';

  async function init() {
    try {
      todosOsParceiros = await fetch('/api/parceiros').then(r=>r.json());
      construirFiltros();
      renderizar(todosOsParceiros);
    } catch(e) {
      document.getElementById('parceirosContainer').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">❌</div><h3>Erro ao carregar</h3></div>`;
    }
  }

  function construirFiltros() {
    const cats = [...new Set(todosOsParceiros.map(p=>p.categoria).filter(Boolean))];
    const bar = document.getElementById('filtersBar');
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.dataset.cat = cat;
      btn.onclick = () => filtrar(cat);
      bar.appendChild(btn);
    });
  }

  function filtrar(cat) {
    catAtiva = cat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    const lista = cat ? todosOsParceiros.filter(p=>p.categoria===cat) : todosOsParceiros;
    renderizar(lista);
  }

  function renderizar(lista) {
    const el = document.getElementById('parceirosContainer');
    if (!lista.length) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🤝</div><h3>Nenhum parceiro encontrado</h3><p>Tente outro filtro.</p></div>`;
      return;
    }
    el.innerHTML = lista.map(p => {
      const wa = p.whatsapp ? `https://wa.me/${p.whatsapp.replace(/\D/g,'')}` : '';
      const site = p.site && (p.site.startsWith('http') ? p.site : `https://${p.site}`);
      return `
        <div class="parceiro-card">
          <div class="parceiro-card-header">
            <div class="parceiro-logo-wrap">
              ${p.logo
                ? `<img src="${p.logo}" alt="${p.nome}" class="parceiro-logo" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'parceiro-logo-placeholder\\'>🤝</div>'">`
                : `<div class="parceiro-logo-placeholder">🤝</div>`}
            </div>
            <div class="parceiro-info">
              ${p.categoria ? `<div class="parceiro-cat-badge">${p.categoria}</div>` : ''}
              <div class="parceiro-nome">${p.nome}</div>
            </div>
          </div>
          ${p.beneficio ? `<div class="parceiro-beneficio-tag"><span>🎁 ${p.beneficio}</span></div>` : ''}
          ${p.descricao ? `<div class="parceiro-body"><p class="parceiro-desc">${p.descricao}</p></div>` : ''}
          ${wa || site || p.contato ? `
            <div class="parceiro-contacts">
              ${wa ? `<a href="${wa}" target="_blank" class="parceiro-btn wa">💬 WhatsApp</a>` : ''}
              ${site ? `<a href="${site}" target="_blank" class="parceiro-btn site">🌐 Site</a>` : ''}
              ${p.contato ? `<span class="parceiro-btn tel">📞 ${p.contato}</span>` : ''}
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  init();
</script>
</body>
</html>
