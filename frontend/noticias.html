<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícias — Copa Med Horus</title>
  <link rel="icon" href="/public/logo-icon.png" type="image/png">
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/logo-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #111111; --primary-mid: #1e1e1e; --primary-light: #2563eb;
      --gold: #F5C200; --gold-light: #ffe94d;
      --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --bg: #f1f5f9;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(10,10,10,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; padding: 0 1.5rem; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-img { height: 38px; width: auto; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 0.25rem; }
    .nav-link { padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; color: rgba(255,255,255,0.7); transition: all 0.18s; white-space: nowrap; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-link.active { color: white; background: rgba(255,255,255,0.12); }
    .nav-link.admin-link { background: var(--gold); color: #111; font-weight: 800; margin-left: 0.5rem; box-shadow: 0 2px 8px rgba(245,194,0,0.35); }
    .nav-link.admin-link:hover { background: var(--gold-light); transform: translateY(-1px); }
    .nav-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    @media(max-width:640px) {
      .nav-links { display: none; flex-direction: column; align-items: flex-start; position: absolute; top: 64px; left: 0; right: 0; background: #0a0a0a; padding: 1rem 1.5rem; gap: 0.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .nav-links.open { display: flex; } .nav-link { width: 100%; } .nav-toggle { display: block; }
    }

    /* PAGE HEADER */
    .page-header { background: #111; background-image: url('/public/court-bg.webp'); background-size: cover; background-position: center; position: relative; padding: 3.5rem 1.5rem; border-bottom: 2px solid rgba(245,194,0,0.15); }
    .page-header::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.82); }
    .page-header-inner { position: relative; z-index: 1; }
    .page-header-inner { max-width: 1200px; margin: 0 auto; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.75rem); font-weight: 900; color: white; letter-spacing: -0.8px; margin-bottom: 0.5rem; }
    .page-header p { font-size: 1rem; color: rgba(255,255,255,0.6); max-width: 540px; }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* NEWS CARDS */
    .noticia-card {
      background: white; border-radius: 18px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1.5px solid transparent;
      transition: all 0.22s; margin-bottom: 1.5rem;
      display: flex; gap: 0;
    }
    .noticia-card:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(0,0,0,0.1); border-color: rgba(37,99,235,0.15); }
    .noticia-card.fixado { border-color: rgba(245,158,11,0.35); background: linear-gradient(to right, #fffbeb, white); }
    .noticia-img { width: 200px; min-height: 160px; object-fit: cover; flex-shrink: 0; }
    .noticia-img-placeholder { width: 200px; min-height: 160px; background: linear-gradient(135deg, #dde4f0, #e8edf5); display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0; }
    .noticia-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .noticia-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .noticia-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 0.2rem 0.6rem; border-radius: 100px; }
    .noticia-tag.fixado { color: #d97706; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); }
    .noticia-tag.cat { color: var(--primary-light); background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2); }
    .noticia-date { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
    .noticia-titulo { font-size: 1.15rem; font-weight: 800; color: var(--text); line-height: 1.3; margin-bottom: 0.6rem; letter-spacing: -0.3px; }
    .noticia-conteudo { font-size: 0.875rem; color: var(--text-muted); line-height: 1.7; flex: 1; }

    @media(max-width:600px) {
      .noticia-card { flex-direction: column; }
      .noticia-img, .noticia-img-placeholder { width: 100%; height: 180px; min-height: unset; }
    }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 12px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
    .lightbox-close { position: absolute; top: 1rem; right: 1.25rem; font-size: 2rem; color: white; cursor: pointer; line-height: 1; opacity: 0.7; transition: opacity 0.15s; }
    .lightbox-close:hover { opacity: 1; }
    .noticia-img { cursor: zoom-in; }

    /* EMPTY/LOADING */
    .empty-state { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { background: #0a0a0a; color: rgba(255,255,255,0.45); padding: 2rem 1.5rem; text-align: center; margin-top: 3rem; border-top: 1px solid rgba(245,194,0,0.12); }
    .footer-logo { font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 0.6rem; }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .footer-link { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.45); transition: color 0.18s; }
    .footer-link:hover { color: white; }
    .footer-copy { font-size: 0.72rem; }
    .footer-instagram { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; background: rgba(245,194,0,0.08); border: 1px solid rgba(245,194,0,0.25); color: rgba(245,194,0,0.8); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700; transition: all 0.2s; text-decoration: none; }
    .footer-instagram:hover { background: rgba(245,194,0,0.15); border-color: rgba(245,194,0,0.5); color: #F5C200; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/public/logo-icon.png" alt="Copa Med Horus" class="nav-logo-img">
    </a>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">Início</a>
      <a href="/noticias.html" class="nav-link active">📰 Notícias</a>
      <a href="/placares.html" class="nav-link">⚽ Jogos</a>
      <a href="/chaveamento.html" class="nav-link">🏆 Chaveamento</a>
      <a href="/regulamento.html" class="nav-link">📋 Regulamento</a>
      <a href="/parceiros.html" class="nav-link">🤝 Parceiros</a>
      <a href="/loja.html" class="nav-link">🛍️ Loja</a>
      <a href="/admin" class="nav-link admin-link">🔐 Admin</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>📰 Notícias & Comunicados</h1>
    <p>Fique por dentro de tudo que acontece na Copa Med Horus.</p>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
  <span class="lightbox-close" onclick="fecharLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<main>
  <div id="noticiasContainer">
    <div style="text-align:center;padding:4rem"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  <div class="footer-logo">🏆 Copa <span>Med Horus</span></div>
  <div class="footer-links">
    <a href="/" class="footer-link">Início</a>
    <a href="/noticias.html" class="footer-link">Notícias</a>
    <a href="/placares.html" class="footer-link">Jogos</a>
    <a href="/parceiros.html" class="footer-link">Parceiros</a>
    <a href="/loja.html" class="footer-link">Loja</a>
  </div>
  <a href="https://www.instagram.com/copamedhorus/" target="_blank" rel="noopener" class="footer-instagram">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    @copamedhorus
  </a>
  <div class="footer-copy">© 2025 Copa Med Horus</div>
</footer>

<script>
  async function init() {
    try {
      const noticias = await fetch('/api/noticias').then(r => r.json());
      const el = document.getElementById('noticiasContainer');
      if (!noticias.length) {
        el.innerHTML = `<div class="empty-state">
          <div class="icon">📰</div>
          <h3>Nenhuma notícia publicada ainda</h3>
          <p>Em breve teremos novidades sobre a Copa Med Horus.</p>
        </div>`;
        return;
      }
      el.innerHTML = noticias.map(n => {
        const data = new Date(n.criado_em).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        return `
          <article class="noticia-card ${n.fixado ? 'fixado' : ''}">
            ${n.imagem
              ? `<img src="${n.imagem}" alt="${n.titulo}" class="noticia-img" loading="lazy" onclick="abrirLightbox('${n.imagem}')">`
              : `<div class="noticia-img-placeholder">📰</div>`}
            <div class="noticia-body">
              <div class="noticia-meta">
                ${n.fixado ? `<span class="noticia-tag fixado">📌 Fixado</span>` : ''}
                ${n.tag ? `<span class="noticia-tag cat">${n.tag}</span>` : ''}
                <span class="noticia-date">${data}</span>
              </div>
              <div class="noticia-titulo">${n.titulo}</div>
              ${n.conteudo ? `<div class="noticia-conteudo">${n.conteudo.replace(/\n/g, '<br>')}</div>` : ''}
            </div>
          </article>`;
      }).join('');
    } catch(e) {
      document.getElementById('noticiasContainer').innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Erro ao carregar notícias</h3></div>`;
    }
  }

  init();

  function abrirLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function fecharLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });
</script>
</body>
</html>
