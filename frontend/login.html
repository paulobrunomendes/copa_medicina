<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Admin — Copa Med Horus</title>
  <link rel="icon" href="/public/favicon.ico" sizes="48x48" type="image/x-icon">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background layers */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(245,194,0,0.09) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(245,194,0,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 65% 85%, rgba(180,120,0,0.07) 0%, transparent 50%),
        #0a0a0a;
    }

    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: rgba(245,194,0,0.11);
      top: -150px; left: -150px;
      animation: drift1 10s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: rgba(200,100,0,0.09);
      bottom: -100px; right: -100px;
      animation: drift2 12s ease-in-out infinite;
    }
    .orb-3 {
      width: 220px; height: 220px;
      background: rgba(245,194,0,0.07);
      top: 40%; right: 15%;
      animation: drift1 8s ease-in-out infinite reverse;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(20px,-25px) scale(1.06); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-15px,20px) scale(1.04); }
    }

    /* Layout */
    .wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 430px;
      padding: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.28);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.6); }

    /* Card */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 2.75rem 2.5rem 2.25rem;
      backdrop-filter: blur(24px);
      box-shadow:
        0 40px 100px rgba(0,0,0,0.65),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.08) inset;
    }

    /* Logo */
    .logo-wrap {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-wrap img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 6px 28px rgba(245,194,0,0.35));
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 6px 28px rgba(245,194,0,0.35)); }
      50%      { filter: drop-shadow(0 10px 38px rgba(245,194,0,0.55)); }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245,194,0,0.1);
      border: 1px solid rgba(245,194,0,0.22);
      border-radius: 100px;
      padding: 0.28rem 0.85rem;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: #f5c200;
      margin-bottom: 0.8rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f5c200;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .card-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }
    .card-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.32);
      margin-bottom: 2rem;
    }

    /* Fields */
    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.67rem;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.45rem;
    }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 0.95rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      line-height: 1;
      pointer-events: none;
      opacity: 0.45;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.82rem 0.9rem 0.82rem 2.7rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: white;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.18); }
    input:focus {
      border-color: rgba(245,194,0,0.5);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(245,194,0,0.1);
    }

    .erro {
      font-size: 0.78rem;
      color: #fca5a5;
      display: none;
      padding: 0.65rem 1rem;
      background: rgba(248,113,113,0.09);
      border: 1px solid rgba(248,113,113,0.18);
      border-radius: 10px;
      margin-bottom: 0.75rem;
    }

    .setup-notice {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: #fcd34d;
      margin-bottom: 1.5rem;
      line-height: 1.55;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #f5c200 0%, #d4a000 100%);
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,194,0,0.28);
    }
    button[type="submit"]:hover {
      background: linear-gradient(135deg, #ffd200 0%, #f5c200 100%);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(245,194,0,0.4);
    }
    button[type="submit"]:active { transform: scale(0.99); box-shadow: none; }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-pattern"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrap">
  <a href="/" class="back-link">← Voltar ao site</a>

  <div class="card">

    <div class="logo-wrap">
      <img src="/public/logo.png" alt="Copa Med Horus">
    </div>

    <!-- Setup (primeiro acesso) -->
    <div id="setupBox" style="display:none">
      <div><span class="badge"><span class="badge-dot"></span>Primeiro acesso</span></div>
      <div class="card-title">Criar conta admin</div>
      <div class="card-sub">Configure o acesso ao painel de controle</div>
      <div class="setup-notice">Nenhum administrador cadastrado. Crie a conta para continuar.</div>
      <form id="setupForm">
        <div class="field">
          <label>Nome completo</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="setupNome" placeholder="Seu nome" required>
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="setupEmail" placeholder="admin@exemplo.com" required>
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="setupSenha" placeholder="Mínimo 6 caracteres" required>
          </div>
        </div>
        <button type="submit" id="setupBtn">Criar conta e entrar →</button>
      </form>
    </div>

    <!-- Login normal -->
    <div id="loginBox" style="display:none">
      <div><span class="badge"><span class="badge-dot"></span>Área restrita</span></div>
      <div class="card-title">Acesso admin</div>
      <div class="card-sub">Entre com suas credenciais para continuar</div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="loginEmail" placeholder="admin@exemplo.com" autocomplete="email" required>
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>
        <div class="erro" id="loginErro"></div>
        <button type="submit" id="loginBtn">Entrar →</button>
      </form>
    </div>

  </div>

  <div class="login-footer">Copa Med Horus 2026 &nbsp;·&nbsp; Área administrativa</div>
</div>

<div id="toastContainer" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:0.5rem"></div>
<script src="/public/js/app.js"></script>
<script>
  async function init() {
    const { precisaSetup } = await api.get('/auth/setup-status');
    document.getElementById(precisaSetup ? 'setupBox' : 'loginBox').style.display = '';
    if (!precisaSetup) document.getElementById('loginEmail').focus();
  }

  document.getElementById('setupForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('setupBtn');
    btn.disabled = true; btn.textContent = 'Criando...';
    try {
      await api.post('/auth/setup', {
        nome: document.getElementById('setupNome').value,
        email: document.getElementById('setupEmail').value,
        senha: document.getElementById('setupSenha').value
      });
      const data = await api.post('/auth/login', {
        email: document.getElementById('setupEmail').value,
        senha: document.getElementById('setupSenha').value
      });
      localStorage.setItem('copa_token', data.token);
      localStorage.setItem('copa_admin', JSON.stringify(data.admin));
      window.location.href = '/admin/';
    } catch (err) {
      toast(err.erro || 'Erro ao criar conta', 'error');
      btn.disabled = false; btn.textContent = 'Criar conta e entrar →';
    }
  };

  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const erroEl = document.getElementById('loginErro');
    const btn = document.getElementById('loginBtn');
    erroEl.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      const data = await api.post('/auth/login', {
        email: document.getElementById('loginEmail').value,
        senha: document.getElementById('loginSenha').value
      });
      localStorage.setItem('copa_token', data.token);
      localStorage.setItem('copa_admin', JSON.stringify(data.admin));
      window.location.href = '/admin/';
    } catch (err) {
      erroEl.textContent = err.erro || 'Email ou senha incorretos';
      erroEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar →';
      document.getElementById('loginSenha').select();
    }
  };

  init();
</script>
</body>
</html>
