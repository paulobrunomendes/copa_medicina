<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Copa Medicina</title>
  <link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      padding: 2rem;
    }
    .error-box {
      text-align: center;
      max-width: 400px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      color: var(--primary);
      letter-spacing: -4px;
    }
    .error-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin: 0.5rem 0 1rem;
    }
    .error-msg {
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-title">Página não encontrada</div>
    <p class="error-msg">A página que você tentou acessar não existe ou foi removida.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Ver placares</a>
      <a href="/admin/" class="btn btn-outline">Painel admin</a>
    </div>
  </div>
</body>
</html>
